<!DOCTYPE html>
<html>
<head>
    <title>Quiz Result</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 20px;
        }
        
        button {
            padding: 10px;
            width: 80%;
            max-width: 300px;
        }
        
        input {
            padding: 10px;
            width: 80%;
            max-width: 300px;
        }
        </style>
</head>
<body>
    <h1>Quiz Finished!</h1>
    <p>Good job, {{ name }}!</p>
    <p>Your final score is {{ score }} out of {{ total }}.</p>

    <a href="{{ url_for('restart') }}">Play Again</a>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</body>
</html>
